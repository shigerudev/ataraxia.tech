services:
  backend:
    build:
      context: ./apps/backend
    container_name: ataraxia-backend
    restart: unless-stopped
    # Todas las variables (Supabase, OpenAI, etc.) se inyectan desde el .env del backend.
    env_file:
      - ./apps/backend/.env
    # No se publica el puerto: el backend solo es accesible vía el proxy de nginx.
    # Necesita salida a internet (Supabase / OpenAI), por eso usa la red bridge por defecto.
    networks:
      - appnet

  frontend:
    build:
      context: ./apps/frontend
    container_name: ataraxia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
